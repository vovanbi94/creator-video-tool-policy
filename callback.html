<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OAuth Callback - Tiem cua boi boi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .box {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      background: #f9f9f9;
    }
  </style>
</head>
<body>
  <h1>OAuth Callback</h1>

  <p>
    Authorization has completed. Please copy the full URL from your browser address bar
    and paste it into the video workflow tool to continue.
  </p>

  <div class="box">
    <p><strong>Current URL:</strong></p>
    <textarea id="currentUrl" readonly></textarea>
  </div>

  <p>
    You may close this page after copying the URL.
  </p>

  <script>
    document.getElementById("currentUrl").value = window.location.href;
  </script>
</body>
</html>
